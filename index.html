<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🏃 Man Runner</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Favicon -->
    <link rel="icon" href="assets/ui/favicon.png">

</head>

<body>

    <!-- ========================= -->
    <!-- START MENU -->
    <!-- ========================= -->

    <div id="loadingScreen">

        <img
            src="assets/ui/menu-background.jpg"
            alt="Background"
            id="menuBackground"
        >

        <div id="overlay">

            <h1 id="gameTitle">
                🏃 MAN RUNNER
            </h1>

            <p>
                Run • Jump • Collect Coins • Avoid Obstacles
            </p>

            <button id="startButton">
                ▶ START GAME
            </button>

        </div>

    </div>

    <!-- ========================= -->
    <!-- GAME -->
    <!-- ========================= -->

    <div id="gameContainer" style="display:none;">

        <canvas
            id="gameCanvas"
            width="1280"
            height="720">
        </canvas>

        <!-- HUD -->

        <div id="hud">

            <div class="panel">
                ❤️ Lives :
                <span id="lives">3</span>
            </div>

            <div class="panel">
                🪙 Coins :
                <span id="coinCount">0</span>
            </div>

            <div class="panel">
                ⭐ Score :
                <span id="score">0</span>
            </div>

            <div class="panel">
                🏆 High Score :
                <span id="highScore">0</span>
            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- GAME OVER -->
    <!-- ========================= -->

    <div id="gameOver" style="display:none;">

        <h1>GAME OVER</h1>

        <h2 id="finalScore">
            Score : 0
        </h2>

        <button id="restartButton">
            🔄 PLAY AGAIN
        </button>

    </div>

    <!-- ========================= -->
    <!-- PRELOAD IMAGES -->
    <!-- ========================= -->

    <!-- Player -->

    <img id="playerRun"
         src="assets/player/man-run.png"
         hidden>

    <img id="playerJump"
         src="assets/player/man-jump.png"
         hidden>

    <!-- Obstacles -->

    <img id="rock"
         src="assets/obstacles/rock.png"
         hidden>

    <img id="cactus"
         src="assets/obstacles/cactus.png"
         hidden>

    <img id="fence"
         src="assets/obstacles/fence.png"
         hidden>

    <!-- Coin -->

    <img id="coin"
         src="assets/coins/coin.png"
         hidden>

    <!-- Background -->

    <img id="clouds"
         src="assets/backgrounds/clouds.png"
         hidden>

    <img id="mountains"
         src="assets/backgrounds/mountains.png"
         hidden>

    <img id="grass"
         src="assets/backgrounds/grass.png"
         hidden>

    <img id="sun"
         src="assets/backgrounds/sun.png"
         hidden>

    <!-- Effects -->

    <img id="dust"
         src="assets/effects/dust.png"
         hidden>

    <img id="sparkle"
         src="assets/effects/sparkle.png"
         hidden>

    <img id="explosion"
         src="assets/effects/explosion.png"
         hidden>

    <!-- Powerups -->

    <img id="speedBoost"
         src="assets/effects/speed-boost.png"
         hidden>

    <img id="slowMotion"
         src="assets/effects/slow-motion.png"
         hidden>

    <img id="heart"
         src="assets/effects/heart.png"
         hidden>

    <!-- Sounds -->

    <audio id="jumpSound" src="assets/sounds/jump.mp3"></audio>

    <audio id="coinSound" src="assets/sounds/coin.mp3"></audio>

    <audio id="hitSound" src="assets/sounds/hit.mp3"></audio>

    <audio id="gameOverSound" src="assets/sounds/gameover.mp3"></audio>

    <audio id="bgMusic"
           src="assets/sounds/background.mp3"
           loop>
    </audio>

    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script src="js/player.js"></script>
    <script src="js/obstacle.js"></script>
    <script src="js/coin.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/game.js"></script>

</body>

</html>
